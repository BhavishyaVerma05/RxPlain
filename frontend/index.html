<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RxPlain | Prescription Plain-Language Translator</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --surface-color: rgba(30, 41, 59, 0.7);
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --danger: #ef4444;
            --danger-bg: rgba(239, 68, 68, 0.1);
            --success: #10b981;
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(59, 130, 246, 0.15), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(16, 185, 129, 0.15), transparent 25%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
            margin: 4rem auto;
            padding: 0 2rem;
            box-sizing: border-box;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        h1 {
            font-size: 3rem;
            margin: 0;
            background: linear-gradient(to right, #60a5fa, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
            margin-top: 0.5rem;
        }

        .glass-panel {
            background: var(--surface-color);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--text-main);
            font-size: 0.95rem;
        }

        textarea {
            width: 100%;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1rem;
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            resize: vertical;
            box-sizing: border-box;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.25);
        }

        button {
            width: 100%;
            background: linear-gradient(135deg, var(--primary), #4f46e5);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 1rem;
            font-size: 1.1rem;
            font-weight: 600;
            font-family: 'Outfit', sans-serif;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            filter: brightness(1.1);
        }

        button:active {
            transform: translateY(0);
        }

        /* Loading Spinner */
        .spinner {
            display: none;
            margin: 2rem auto;
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border-top-color: var(--primary);
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Results Section */
        #results-section {
            display: none;
            margin-top: 2rem;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .risk-banner {
            background: var(--danger-bg);
            border-left: 4px solid var(--danger);
            padding: 1.5rem;
            border-radius: 0 8px 8px 0;
            margin-bottom: 1.5rem;
            display: none;
        }

        .risk-banner h3 {
            color: var(--danger);
            margin-top: 0;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .risk-banner ul {
            margin: 0.5rem 0 1.5rem 0;
            padding-left: 1.5rem;
            color: #fca5a5;
        }

        .ack-button {
            background: transparent;
            border: 1px solid var(--danger);
            color: var(--danger);
            width: auto;
            padding: 0.5rem 1.5rem;
            font-size: 0.95rem;
        }

        .ack-button:hover {
            background: var(--danger);
            color: white;
        }

        .summary-box {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.5rem;
            font-size: 1.1rem;
            line-height: 1.6;
            display: none;
        }
        
        .summary-box.visible {
            display: block;
        }

        .disclaimer {
            margin-top: 3rem;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.85rem;
            max-width: 600px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>RxPlain</h1>
            <p class="subtitle">Prescription Plain-Language Translator</p>
        </header>

        <div class="glass-panel">
            <form id="rx-form">
                <div class="form-group">
                    <label for="prescription">Enter prescription text</label>
                    <textarea id="prescription" rows="3" placeholder="e.g. Lisinopril 10mg, 1 tab po bid" required></textarea>
                </div>
                
                <div class="form-group">
                    <label for="other-meds">Other current medications, if any <span style="color:var(--text-muted);font-weight:400;">(optional, comma-separated)</span></label>
                    <textarea id="other-meds" rows="2" placeholder="e.g. Aspirin, Metformin"></textarea>
                </div>
                
                <button type="submit" id="submit-btn">Translate Prescription</button>
            </form>
            
            <div class="spinner" id="loading-spinner"></div>
            
            <div id="results-section">
                <!-- Red Banner -->
                <div id="risk-banner" class="risk-banner">
                    <h3>
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
                        High Risk Identified
                    </h3>
                    <ul id="risk-reasons"></ul>
                    <button id="ack-btn" class="ack-button">I understand the risks</button>
                </div>
                
                <!-- Plain Language Summary -->
                <div id="summary-box" class="summary-box"></div>
            </div>
        </div>
        
        <div class="disclaimer">
            This is not medical advice. Confirm all instructions with your pharmacist or doctor before taking any medication.
        </div>
    </div>

    <script>
        document.getElementById('rx-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const prescription = document.getElementById('prescription').value;
            const otherMeds = document.getElementById('other-meds').value;
            
            // UI state updates
            document.getElementById('submit-btn').style.display = 'none';
            document.getElementById('loading-spinner').style.display = 'block';
            document.getElementById('results-section').style.display = 'none';
            document.getElementById('risk-banner').style.display = 'none';
            document.getElementById('summary-box').classList.remove('visible');
            
            try {
                const response = await fetch('/api/translate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        prescription: prescription,
                        other_meds: otherMeds
                    })
                });
                
                const data = await response.json();
                
                if (data.success === false) {
                    alert(data.message);
                } else if (data.error) {
                    alert('Error: ' + data.error);
                } else {
                    displayResults(data);
                }
            } catch (err) {
                alert('Connection error: ' + err.message);
            } finally {
                document.getElementById('submit-btn').style.display = 'block';
                document.getElementById('loading-spinner').style.display = 'none';
            }
        });

        function displayResults(data) {
            document.getElementById('results-section').style.display = 'block';
            const summaryBox = document.getElementById('summary-box');
            summaryBox.innerText = data.summary;
            
            const guardrails = data.guardrails;
            
            if (guardrails.block_flag) {
                const banner = document.getElementById('risk-banner');
                const reasonsList = document.getElementById('risk-reasons');
                reasonsList.innerHTML = '';
                
                guardrails.block_reasons.forEach(reason => {
                    const li = document.createElement('li');
                    li.innerText = reason;
                    reasonsList.appendChild(li);
                });
                
                banner.style.display = 'block';
                
                // Require acknowledgement before showing summary
                document.getElementById('ack-btn').onclick = function() {
                    banner.style.display = 'none';
                    summaryBox.classList.add('visible');
                };
            } else {
                summaryBox.classList.add('visible');
            }
        }
    </script>
</body>
</html>
